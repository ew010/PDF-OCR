name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS App
        run: |
          pyinstaller \
            --name "PDF2Markdown" \
            --windowed \
            --onefile \
            --icon=assets/icon.icns \
            --add-data "assets:assets" \
            --hidden-import=rapidocr \
            --hidden-import=onnxruntime \
            --hidden-import=fitz \
            --hidden-import=PIL \
            main_gui.py

      - name: Package macOS
        run: |
          cd dist
          zip -r "PDF2Markdown-macOS.zip" "PDF2Markdown.app" || zip -r "PDF2Markdown-macOS.zip" "PDF2Markdown"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/PDF2Markdown-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller `
            --name "PDF2Markdown" `
            --windowed `
            --onefile `
            --icon=assets/icon.ico `
            --add-data "assets;assets" `
            --hidden-import=rapidocr `
            --hidden-import=onnxruntime `
            --hidden-import=fitz `
            --hidden-import=PIL `
            main_gui.py

      - name: Package Windows
        run: |
          cd dist
          Compress-Archive -Path "PDF2Markdown.exe" -DestinationPath "PDF2Markdown-Windows.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/PDF2Markdown-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-build/PDF2Markdown-macOS.zip
            artifacts/windows-build/PDF2Markdown-Windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
