name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS App
        run: |
          pyinstaller \
            --name "PDF2Markdown" \
            --windowed \
            --onedir \
            --osx-bundle-identifier "com.ew010.pdf2markdown" \
            --collect-submodules rapidocr \
            --collect-submodules rapidocr.utils \
            --collect-binaries onnxruntime \
            --copy-metadata rapidocr \
            --copy-metadata onnxruntime \
            --exclude-module matplotlib \
            --exclude-module numpy.random._examples \
            --exclude-module scipy \
            --exclude-module pandas \
            --exclude-module sklearn \
            --exclude-module PyQt6.Qt6.Qml \
            --exclude-module PyQt6.Qt6.QmlModels \
            --exclude-module PyQt6.Qt6.Quick \
            --exclude-module PyQt6.Qt6.Quick3D \
            --exclude-module PyQt6.Qt6.Quick3DAssetImport \
            --exclude-module PyQt6.Qt6.Quick3DHelpers \
            --exclude-module PyQt6.Qt6.Quick3DParticles \
            --exclude-module PyQt6.Qt6.Quick3DRuntimeRender \
            --exclude-module PyQt6.Qt6.Quick3DUtils \
            --exclude-module PyQt6.Qt6.QuickControls2 \
            --exclude-module PyQt6.Qt6.QuickDialogs2 \
            --exclude-module PyQt6.Qt6.QuickDialogs2QuickImpl \
            --exclude-module PyQt6.Qt6.QuickDialogs2Utils \
            --exclude-module PyQt6.Qt6.QuickLayouts \
            --exclude-module PyQt6.Qt6.QuickParticles \
            --exclude-module PyQt6.Qt6.QuickShapes \
            --exclude-module PyQt6.Qt6.QuickTemplates2 \
            --exclude-module PyQt6.Qt6.QuickTest \
            --exclude-module PyQt6.Qt6.QuickTimeline \
            --exclude-module PyQt6.Qt6.QuickWidgets \
            --exclude-module PyQt6.Qt6.3DAnimation \
            --exclude-module PyQt6.Qt6.3DCore \
            --exclude-module PyQt6.Qt6.3DExtras \
            --exclude-module PyQt6.Qt6.3DInput \
            --exclude-module PyQt6.Qt6.3DLogic \
            --exclude-module PyQt6.Qt6.3DRender \
            --exclude-module PyQt6.Qt6.Charts \
            --exclude-module PyQt6.Qt6.DataVisualization \
            --exclude-module PyQt6.Qt6.Graphs \
            --exclude-module PyQt6.Qt6.Location \
            --exclude-module PyQt6.Qt6.Multimedia \
            --exclude-module PyQt6.Qt6.MultimediaWidgets \
            --exclude-module PyQt6.Qt6.Network \
            --exclude-module PyQt6.Qt6.Nfc \
            --exclude-module PyQt6.Qt6.Positioning \
            --exclude-module PyQt6.Qt6.PositioningQuick \
            --exclude-module PyQt6.Qt6.RemoteObjects \
            --exclude-module PyQt6.Qt6.Sensors \
            --exclude-module PyQt6.Qt6.SerialPort \
            --exclude-module PyQt6.Qt6.Speech \
            --exclude-module PyQt6.Qt6.Sql \
            --exclude-module PyQt6.Qt6.StateMachine \
            --exclude-module PyQt6.Qt6.Svg \
            --exclude-module PyQt6.Qt6.SvgWidgets \
            --exclude-module PyQt6.Qt6.Test \
            --exclude-module PyQt6.Qt6.TextToSpeech \
            --exclude-module PyQt6.Qt6.WebChannel \
            --exclude-module PyQt6.Qt6.WebEngineCore \
            --exclude-module PyQt6.Qt6.WebEngineQuick \
            --exclude-module PyQt6.Qt6.WebEngineWidgets \
            --exclude-module PyQt6.Qt6.WebSockets \
            --exclude-module PyQt6.Qt6.WebView \
            --hidden-import=rapidocr \
            --hidden-import=onnxruntime \
            --hidden-import=fitz \
            --hidden-import=PIL \
            main_gui.py

      - name: Package macOS
        run: |
          cd dist
          zip -r "PDF2Markdown-macOS.zip" "PDF2Markdown.app"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/PDF2Markdown-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller `
            --name "PDF2Markdown" `
            --windowed `
            --onefile `
            --collect-submodules rapidocr `
            --collect-submodules rapidocr.utils `
            --collect-binaries onnxruntime `
            --copy-metadata rapidocr `
            --copy-metadata onnxruntime `
            --exclude-module matplotlib `
            --exclude-module scipy `
            --exclude-module pandas `
            --exclude-module sklearn `
            --hidden-import=rapidocr `
            --hidden-import=onnxruntime `
            --hidden-import=fitz `
            --hidden-import=PIL `
            main_gui.py

      - name: Package Windows
        run: |
          cd dist
          Compress-Archive -Path "PDF2Markdown.exe" -DestinationPath "PDF2Markdown-Windows.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/PDF2Markdown-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-build/PDF2Markdown-macOS.zip
            artifacts/windows-build/PDF2Markdown-Windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
